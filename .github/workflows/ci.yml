name: KeyPilot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Build + lint + unit tests ─────────────────────────────────────────────
  # Runs on every push and PR. Uses placeholder DB URL — no live DB required.
  build-and-test:
    name: Build, lint & unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholders so CI runs without secrets (Prisma generate doesn't connect to DB)
          DATABASE_URL: postgresql://localhost:5432/keypilot_ci
          DIRECT_URL: postgresql://localhost:5432/keypilot_ci
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://keypilot.vercel.app

      - name: Unit tests
        # Excludes tests/ directory (isolation tests require a live DB)
        run: npm test
        env:
          DATABASE_URL: postgresql://localhost:5432/keypilot_ci

      - name: Prisma safety check
        # Fails on deprecated `prisma` alias imports.
        # Warns on auth-gated routes that use prismaAdmin without withRLSContext.
        run: npm run check:prisma

  # ── RLS isolation tests ───────────────────────────────────────────────────
  # Connects to the real preview Supabase project. Skipped on forks and when
  # the DATABASE_URL secret is not set.
  # To enable: add DATABASE_URL as a repository secret (Settings → Secrets).
  isolation-tests:
    name: RLS isolation tests (preview DB)
    runs-on: ubuntu-latest
    # secrets context is not available in `if` for fork PRs — this safely skips
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Keep preview DB in sync with prisma/migrations (e.g. new columns). RLS tests
      # seed via Prisma and fail if the schema lags (P2022 column does not exist).
      # Supabase: prisma migrate deploy must use a non-pooled connection. If DATABASE_URL
      # uses the transaction pooler (?pgbouncer=true or port 6543), set DIRECT_URL to the
      # direct/session URL (db.<project>.supabase.co:5432) in repo secrets.
      - name: Apply Prisma migrations (preview DB)
        shell: bash
        run: |
          set -euo pipefail
          db_url="${DATABASE_URL:?DATABASE_URL secret is not set}"
          direct="${DIRECT_URL:-}"
          lower_db="$(printf '%s' "$db_url" | tr '[:upper:]' '[:lower:]')"
          poolerish=false
          case "$lower_db" in
            *pgbouncer=true*|*pgbouncer=1*) poolerish=true ;;
          esac
          case "$db_url" in
            *:6543/*|*:6543\?*) poolerish=true ;;
          esac
          if [ "$poolerish" = true ]; then
            if [ -z "$direct" ] || [ "$direct" = "$db_url" ]; then
              echo "::error::Prisma migrations cannot use a transaction-pooled Supabase URL alone. Add DIRECT_URL (direct db host, port 5432, no pgbouncer) alongside DATABASE_URL in repo secrets."
              exit 1
            fi
            export DIRECT_URL="$direct"
          else
            export DIRECT_URL="${direct:-$db_url}"
          fi
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run RLS isolation tests
        shell: bash
        run: |
          export DIRECT_URL="${DIRECT_URL:-$DATABASE_URL}"
          npm run test:integration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://keypilot.vercel.app
