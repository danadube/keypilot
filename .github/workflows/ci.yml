name: KeyPilot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Build + lint + unit tests ─────────────────────────────────────────────
  # Runs on every push and PR. Uses placeholder DB URL — no live DB required.
  build-and-test:
    name: Build, lint & unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholders so CI runs without secrets (Prisma generate doesn't connect to DB)
          DATABASE_URL: postgresql://localhost:5432/keypilot_ci
          DIRECT_URL: postgresql://localhost:5432/keypilot_ci
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://keypilot.vercel.app

      - name: Unit tests
        # Excludes tests/ directory (isolation tests require a live DB)
        run: npm test
        env:
          DATABASE_URL: postgresql://localhost:5432/keypilot_ci

      - name: Prisma safety check
        # Fails on deprecated `prisma` alias imports.
        # Warns on auth-gated routes that use prismaAdmin without withRLSContext.
        run: npm run check:prisma

  # ── RLS isolation tests ───────────────────────────────────────────────────
  # Connects to the real preview Supabase project. Skipped on forks and when
  # the DATABASE_URL secret is not set.
  #
  # Prisma migrate deploy must use a direct Postgres connection, not Supabase poolers:
  # - Transaction pooler: *.pooler.supabase.com:6543 → hits PgBouncer limits / prepared stmt issues
  # - Session pooler: *.pooler.supabase.com:5432 → MaxClientsInSessionMode (pool_size)
  # Use DATABASE_URL secret for detection/fallback; set DIRECT_URL to db.<project>.supabase.co:5432
  # (Supabase Dashboard → Database → Connection string → URI, direct host).
  # To enable: add DATABASE_URL and DIRECT_URL as repository secrets (see docs/platform/database-migrations.md).
  isolation-tests:
    name: RLS isolation tests (preview DB)
    runs-on: ubuntu-latest
    # Skip entirely for PRs from forks (untrusted code; secrets are not exposed to those runs).
    # When DATABASE_URL is unset or blank, an early step skips the rest of the job (optional integration).
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip RLS isolation when DATABASE_URL is unset
        id: isolation_db_config
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          raw="${DATABASE_URL:-}"
          if [[ -z "$raw" || "$raw" =~ ^[[:space:]]+$ ]]; then
            echo "RLS isolation tests skipped: DATABASE_URL secret is not set or is blank."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.isolation_db_config.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.isolation_db_config.outputs.skip != 'true'
        run: npm ci

      # Single direct Postgres URL for prisma migrate deploy + prismaAdmin in Jest (both env vars set the same).
      # Must NOT be Supabase pooler (6543 or *.pooler.supabase.com) — those exhaust MaxClientsInSessionMode.
      # Resolution order: PRISMA_MIGRATE_DATABASE_URL (CI-only override) → DIRECT_URL → DATABASE_URL.
      # Use GITHUB_OUTPUT + step env so passwords with $/# do not break parsing.
      - name: Resolve Prisma URLs for isolation job (direct DB only for migrate)
        if: steps.isolation_db_config.outputs.skip != 'true'
        id: resolve_prisma_db
        shell: bash
        run: |
          set -euo pipefail
          trim() {
            local s="${1:-}"
            s="${s#"${s%%[![:space:]]*}"}"
            s="${s%"${s##*[![:space:]]}"}"
            printf '%s' "$s"
          }

          raw_db="$(trim "${DATABASE_URL_RAW:?DATABASE_URL secret is not set}")"
          raw_direct="$(trim "${DIRECT_URL_RAW:-}")"
          raw_migrate="$(trim "${PRISMA_MIGRATE_DATABASE_URL_RAW:-}")"

          uses_6543() {
            case "$1" in
              *:6543/* | *:6543\?* | *:6543) return 0 ;;
              *) return 1 ;;
            esac
          }
          # Session + transaction poolers share this host; both are unsuitable for prisma migrate deploy.
          uses_pooler_host() {
            case "$1" in
              *pooler.supabase.com* | *POOLER.SUPABASE.COM*) return 0 ;;
              *) return 1 ;;
            esac
          }
          is_unsuitable_for_migrate() {
            uses_6543 "$1" || uses_pooler_host "$1"
          }
          err_resolve() {
            echo "::error::$1"
            exit 1
          }

          resolved=""
          if [ -n "$raw_migrate" ] && ! is_unsuitable_for_migrate "$raw_migrate"; then
            resolved="$raw_migrate"
            echo "Using PRISMA_MIGRATE_DATABASE_URL for migrate / RLS tests (direct Postgres)."
          elif [ -n "$raw_direct" ] && ! is_unsuitable_for_migrate "$raw_direct"; then
            resolved="$raw_direct"
            echo "Using DIRECT_URL for migrate / RLS tests."
          elif ! is_unsuitable_for_migrate "$raw_db"; then
            resolved="$raw_db"
            echo "Using DATABASE_URL for migrate / RLS tests (already non-pooler)."
          fi

          if [ -z "$resolved" ]; then
            echo "::notice::DATABASE_URL is pooler or :6543: $(if is_unsuitable_for_migrate "$raw_db"; then echo yes; else echo no; fi). DIRECT_URL set: $([ -n "$raw_direct" ] && echo yes || echo no). PRISMA_MIGRATE_DATABASE_URL set: $([ -n "$raw_migrate" ] && echo yes || echo no)."
            err_resolve "No direct Postgres URL for migrate. Your DATABASE_URL/DIRECT_URL look like Supabase poolers (port 6543 or host *.pooler.supabase.com). Add repository secret PRISMA_MIGRATE_DATABASE_URL with the direct URI from Supabase → Project Settings → Database → Connection string: choose \"Direct connection\" (host db.<project-ref>.supabase.co), not Session or Transaction pooler. Alternatively set DIRECT_URL to that same direct URI. See docs/platform/database-migrations.md § GitHub Actions."
          fi

          if is_unsuitable_for_migrate "$resolved"; then
            err_resolve "Resolved Prisma URL must be direct Postgres (not pooler.supabase.com and not port 6543)."
          fi

          {
            echo "prisma_database_url<<PRISMA_DB_URL_EOF"
            printf '%s' "$resolved"
            echo
            echo "PRISMA_DB_URL_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL }}
          DIRECT_URL_RAW: ${{ secrets.DIRECT_URL }}
          PRISMA_MIGRATE_DATABASE_URL_RAW: ${{ secrets.PRISMA_MIGRATE_DATABASE_URL }}

      # Keep preview DB in sync with prisma/migrations (e.g. new columns). RLS tests
      # seed via Prisma and fail if the schema lags (P2022 column does not exist).
      - name: Apply Prisma migrations (preview DB)
        if: steps.isolation_db_config.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ steps.resolve_prisma_db.outputs.prisma_database_url }}
          DIRECT_URL: ${{ steps.resolve_prisma_db.outputs.prisma_database_url }}
        run: npx prisma migrate deploy

      - name: Run RLS isolation tests
        if: steps.isolation_db_config.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ steps.resolve_prisma_db.outputs.prisma_database_url }}
          DIRECT_URL: ${{ steps.resolve_prisma_db.outputs.prisma_database_url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://keypilot.vercel.app
        run: npm run test:integration
